name: litefupzl oneshot

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: Optional per-slot runtime override for manual smoke tests
        required: false
        default: ""
      cookie_refresh_enabled:
        description: Enable production cookie refresh write-back for this manual run
        required: false
        default: "false"
      cookie_refresh_probe:
        description: Run a dedicated redacted GitHub secret persistence probe
        required: false
        default: "false"
      upload_artifacts:
        description: Upload public redacted artifacts for this manual run
        required: false
        default: "false"
  schedule:
    # GitHub cron is always UTC. These map to 09:30 and 15:30 UTC+8.
    - cron: "30 1 * * *"
    - cron: "30 7 * * *"

jobs:
  oneshot:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
      actions: write
    env:
      LITEFUPZL_SITE: ${{ vars.LITEFUPZL_SITE || 'linux.do' }}
      LITEFUPZL_COOKIES_JSON: ${{ secrets.LITEFUPZL_COOKIES_JSON || secrets.FUCKPZL_ONESHOT_COOKIES_JSON }}
      LITEFUPZL_ACTIONS_ADMIN_TOKEN: ${{ secrets.LITEFUPZL_ACTIONS_ADMIN_TOKEN || secrets.FUCKPZL_ACTIONS_ADMIN_TOKEN }}
      LITEFUPZL_DURATION_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.duration_minutes || vars.LITEFUPZL_DURATION_MINUTES || vars.FUCKPZL_ONESHOT_DURATION_MINUTES || '40' }}
      LITEFUPZL_HEADLESS: ${{ vars.LITEFUPZL_HEADLESS || vars.FUCKPZL_ONESHOT_HEADLESS || 'false' }}
      LITEFUPZL_OUTPUT_DIR: ${{ vars.LITEFUPZL_OUTPUT_DIR || vars.FUCKPZL_ONESHOT_OUTPUT_DIR || 'output/litefupzl' }}
      LITEFUPZL_BROWSER: ${{ vars.LITEFUPZL_BROWSER || vars.FUCKPZL_ONESHOT_BROWSER || 'chromium' }}
      LITEFUPZL_PROXY_SERVER: ${{ vars.LITEFUPZL_PROXY_SERVER || vars.FUCKPZL_ONESHOT_PROXY_SERVER || 'http://127.0.0.1:1080' }}
      LITEFUPZL_VIRTUAL_DISPLAY: ${{ vars.LITEFUPZL_VIRTUAL_DISPLAY || vars.FUCKPZL_ONESHOT_VIRTUAL_DISPLAY || 'true' }}
      # Keep scheduled validation runs read-only. Manual runs can opt in explicitly.
      LITEFUPZL_COOKIE_REFRESH_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.cookie_refresh_enabled == 'true' && 'true' || 'false' }}
      LITEFUPZL_COOKIE_REFRESH_PROBE_SECRET: LITEFUPZL_COOKIE_REFRESH_PROBE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install official Cloudflare WARP
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gpg lsb-release
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Connect WARP
        run: |
          sudo pkill warp-svc || true
          sudo nohup warp-svc > warp-svc.log 2>&1 &
          sleep 5
          warp-cli --accept-tos registration new || warp-cli registration new || true
          warp-cli --accept-tos connect || warp-cli connect || true
          sleep 15
          warp-cli --accept-tos status || warp-cli status || true
          curl -fsSL https://www.cloudflare.com/cdn-cgi/trace | tee warp-trace.txt
          grep -q 'warp=on' warp-trace.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install proxy.py
          sudo apt-get install -y xvfb
          case "${LITEFUPZL_BROWSER:-chromium}" in
            patchright-chromium)
              python -m patchright install --with-deps chromium
              ;;
            camoufox)
              python -m playwright install-deps firefox
              python -m camoufox fetch
              ;;
            firefox)
              python -m playwright install --with-deps firefox
              ;;
            *)
              python -m playwright install --with-deps chromium
              ;;
          esac

      - name: Start local HTTP proxy over WARP
        run: |
          nohup python -m proxy --hostname 127.0.0.1 --port 1080 > local-proxy.log 2>&1 &
          sleep 5
          curl -fsSL -x http://127.0.0.1:1080 https://www.cloudflare.com/cdn-cgi/trace | tee warp-proxy-trace.txt
          grep -q 'warp=on' warp-proxy-trace.txt

      - name: Run oneshot
        run: |
          if [ "${LITEFUPZL_HEADLESS:-true}" = "false" ] && [ "${LITEFUPZL_VIRTUAL_DISPLAY:-true}" != "true" ]; then
            xvfb-run -a python apps/litefupzl/main.py
          else
            python apps/litefupzl/main.py
          fi

      - name: Run auth probe
        if: always()
        run: |
          if [ "${LITEFUPZL_HEADLESS:-true}" = "false" ] && [ "${LITEFUPZL_VIRTUAL_DISPLAY:-true}" != "true" ]; then
            xvfb-run -a python apps/litefupzl/auth_probe.py
          else
            python apps/litefupzl/auth_probe.py
          fi

      - name: Run cookie refresh persistence probe
        if: always() && github.event_name == 'workflow_dispatch' && inputs.cookie_refresh_probe == 'true'
        run: python apps/litefupzl/cookie_refresh_probe.py

      - name: Upload redacted artifacts
        if: always() && github.event_name == 'workflow_dispatch' && inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: litefupzl-oneshot-public-artifacts
          path: |
            ${{ env.LITEFUPZL_OUTPUT_DIR }}/
            warp-trace.txt
            warp-proxy-trace.txt
            warp-svc.log
            local-proxy.log

      - name: Cleanup old workflow runs
        if: always()
        env:
          ACTIONS_CLEANUP_TOKEN: ${{ secrets.LITEFUPZL_ACTIONS_ADMIN_TOKEN || secrets.FUCKPZL_ACTIONS_ADMIN_TOKEN || github.token }}
          ACTIONS_RUNS_KEEP: ${{ vars.LITEFUPZL_ACTIONS_RUNS_KEEP || vars.FUCKPZL_ACTIONS_RUNS_KEEP || '15' }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          repo = os.environ.get("GITHUB_REPOSITORY")
          token = os.environ.get("ACTIONS_CLEANUP_TOKEN")
          current_run_id = str(os.environ.get("GITHUB_RUN_ID") or "")
          try:
              keep = max(1, int(os.environ.get("ACTIONS_RUNS_KEEP") or "15"))
          except ValueError:
              keep = 15

          if not repo or not token:
              print("cleanup_skipped=missing_repo_or_token")
              raise SystemExit(0)

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "litefupzl-actions-run-cleanup",
          }

          def request(method: str, url: str):
              req = urllib.request.Request(url, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = resp.read()
                  return json.loads(payload) if payload else None

          all_runs = []
          page = 1
          while True:
              url = "https://api.github.com/repos/{}/actions/runs?{}".format(
                  repo,
                  urllib.parse.urlencode({"per_page": 100, "page": page}),
              )
              try:
                  data = request("GET", url)
              except urllib.error.HTTPError as exc:
                  print(f"cleanup_fetch_failed=status_{exc.code}")
                  raise SystemExit(0)

              runs = (data or {}).get("workflow_runs", [])
              if not runs:
                  break
              all_runs.extend(runs)
              if len(runs) < 100:
                  break
              page += 1

          deleted = 0
          skipped = 0
          for index, run in enumerate(all_runs):
              if index < keep:
                  continue
              run_id = str(run.get("id") or "")
              if not run_id or run_id == current_run_id or run.get("status") != "completed":
                  skipped += 1
                  continue
              try:
                  request("DELETE", f"https://api.github.com/repos/{repo}/actions/runs/{run_id}")
                  deleted += 1
                  print(f"deleted_run={run_id}")
              except urllib.error.HTTPError as exc:
                  skipped += 1
                  print(f"delete_failed={run_id} status={exc.code}")

          print(f"cleanup_runs_seen={len(all_runs)} keep={keep} deleted={deleted} skipped={skipped}")
          PY
